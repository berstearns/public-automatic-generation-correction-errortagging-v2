# Default pipeline — GPT-2 base + medium on EFCAMDAT
# Usage: python -m gen_gec_errant.pipeline --config configs/pipeline/default.yaml
data_loader:
  data_path: data/efcamdat_sentences.txt
  max_sentences: null
  min_words: 10
  max_words: 10000
  prompt_ratio: 0.5
  min_prompt_words: 3
  split_sentences: true

generation:
  max_new_tokens: 50
  min_new_tokens: 10
  temperature: 1.0
  top_k: 50
  top_p: 0.95
  do_sample: true
  num_return_sequences: 1
  repetition_penalty: 1.2

gec:
  method: dedicated
  model_id: grammarly/coedit-large
  batch_size: 32
  device: auto

annotation:
  lang: en

analysis:
  output_dir: results
  skip_plots: false
  top_n_error_types: 10

models:
  - name: gpt2-base
    hf_model_id: gpt2
    model_family: gpt2
  - name: gpt2-medium
    hf_model_id: gpt2-medium
    model_family: gpt2

batch_size: 8
device: auto
seed: 42
output_dir: results
skip_generation: false
skip_gec: false
skip_plots: false
include_learner_baseline: true
