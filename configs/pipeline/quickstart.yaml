# Quickstart pipeline — 20 sentences, gpt2-base, fast validation
# Usage: python -m gen_gec_errant.pipeline --config configs/pipeline/quickstart.yaml
data_loader:
  data_path: data/efcamdat_sentences.txt
  max_sentences: 20
  min_words: 10
  max_words: 100
  prompt_ratio: 0.5

generation:
  max_new_tokens: 30
  min_new_tokens: 5
  temperature: 1.0
  top_k: 50
  top_p: 0.95
  do_sample: true
  repetition_penalty: 1.2

gec:
  method: dedicated
  model_id: grammarly/coedit-large
  batch_size: 16
  device: auto

annotation:
  lang: en

analysis:
  skip_plots: false
  top_n_error_types: 10

models:
  - name: gpt2-base
    hf_model_id: gpt2
    model_family: gpt2

batch_size: 4
device: auto
seed: 42
output_dir: results/quickstart
include_learner_baseline: true
