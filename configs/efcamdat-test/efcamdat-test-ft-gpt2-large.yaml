# GPT-2 Large (774M) (fine-tuned) — EFCAMDAT test split
# Usage: python -m gen_gec_errant.pipeline --config configs/efcamdat-test/efcamdat-test-ft-gpt2-large.yaml
data_loader:
  data_path: ./data/splits/norm-EFCAMDAT-test.csv
  text_column: text
  max_sentences: 10
  min_words: 10
  max_words: 500
  prompt_ratio: 0.5
  min_prompt_words: 5
  split_sentences: true

generation:
  max_new_tokens: 50
  min_new_tokens: 10
  temperature: 1.0
  top_k: 50
  top_p: 0.95
  do_sample: true
  repetition_penalty: 1.2

gec:
  method: dedicated
  model_id: grammarly/coedit-large
  batch_size: 4
  device: auto

annotation:
  lang: en

analysis:
  skip_plots: false
  top_n_error_types: 10

models:
  - name: ft-gpt2-large
    hf_model_id: ./models/gpt2/gpt2-large-all-data/best/checkpoint-6750
    model_family: gpt2
    is_learner_tuned: true

batch_size: 2
device: auto
seed: 42
output_dir: outputs/efcamdat-test-ft-gpt2-large
skip_plots: false
include_learner_baseline: true
