# Generation — fine-tuned GPT-2 Medium (355M)
# Usage: python -m gen_gec_errant.generation --config configs/generation/ft-gpt2-medium.yaml
params:
  max_new_tokens: 50
  min_new_tokens: 10
  temperature: 1.0
  top_k: 50
  top_p: 0.95
  do_sample: true
  num_return_sequences: 1
  repetition_penalty: 1.2

model:
  name: ft-gpt2-medium
  hf_model_id: ./models/gpt2/gpt2-medium-all-data/best/checkpoint-5625
  model_family: gpt2
  is_learner_tuned: true

batch_size: 8
device: auto
seed: 42
