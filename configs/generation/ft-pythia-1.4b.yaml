# Generation — fine-tuned Pythia 1.4B
# Usage: python -m gen_gec_errant.generation --config configs/generation/ft-pythia-1.4b.yaml
params:
  max_new_tokens: 50
  min_new_tokens: 10
  temperature: 1.0
  top_k: 50
  top_p: 0.95
  do_sample: true
  num_return_sequences: 1
  repetition_penalty: 1.2

model:
  name: ft-pythia-1.4b
  hf_model_id: ./models/pythia/pythia-1.4b-all-data/final
  model_family: pythia
  is_learner_tuned: true

batch_size: 8
device: auto
seed: 42
